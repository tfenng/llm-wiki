name: PR lint

# Gates every incoming PR on the governance rules from
# docs/maintainers/REVIEW_CHECKLIST.md:
#   1. Conventional-commit title prefix
#   2. CHANGELOG.md updated (skipped for chore/docs/test-only PRs)
#   3. No new runtime dependencies in pyproject.toml
#
# The main tests + lint + privacy scan live in `ci.yml` — this workflow
# is just the governance gate.

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  title:
    name: Conventional commit title
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title prefix
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title || "";
            // Accept: feat[(...)]:, fix[(...)]:, docs:, chore:, test:, release:
            const pattern = /^(feat|fix|docs|chore|test|release)(\([^)]+\))?:\s.+/;
            if (!pattern.test(title)) {
              core.setFailed(
                `PR title must start with one of feat: / fix: / docs: / chore: / ` +
                `test: / release: (optionally with a version scope like ` +
                `feat(v0.8):). Got: "${title}". See CONTRIBUTING.md.`
              );
            } else {
              core.info(`PR title prefix OK: ${title}`);
            }

  changelog:
    name: CHANGELOG.md updated
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip for doc/test/chore-only PRs
        id: classify
        run: |
          title="${{ github.event.pull_request.title }}"
          if [[ "$title" == docs:* || "$title" == chore:* || "$title" == test:* ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify CHANGELOG.md has a new entry
        if: steps.classify.outputs.skip == 'false'
        run: |
          set -e
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          if ! git diff --name-only "$base" "$head" | grep -qx 'CHANGELOG.md'; then
            echo "::error::CHANGELOG.md must be updated for feat: and fix: PRs."
            echo "::error::See docs/maintainers/REVIEW_CHECKLIST.md for the rule."
            exit 1
          fi

  runtime-deps:
    name: No new runtime dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Diff pyproject.toml dependencies
        run: |
          set -e
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          if git diff "$base" "$head" -- pyproject.toml | grep -E '^\+' | grep -qE 'dependencies\s*='; then
            echo "::warning::pyproject.toml dependencies block changed."
            echo "::warning::New runtime deps need explicit maintainer approval."
            echo "::warning::See CONTRIBUTING.md rule #4 (no new runtime deps)."
          fi
          # Never fail — this is a heads-up, not a block. The human
          # reviewer decides. But we surface the warning loudly.
