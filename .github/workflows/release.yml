name: Release to PyPI

# Triggered by pushing a version tag (e.g. v0.9.0, v1.0.0-rc1).
# Builds sdist + wheel, signs with Sigstore, publishes to PyPI via
# OIDC trusted publisher, and attaches artifacts to the GitHub Release.
#
# Prerequisites (one-time manual setup):
#   1. Register the project on PyPI as a trusted publisher:
#      https://docs.pypi.org/trusted-publishers/creating-a-project-through-oidc/
#      - PyPI project name: llmwiki
#      - Owner: Pratiyush
#      - Repository: llm-wiki
#      - Workflow: release.yml
#      - Environment: release
#   2. Create a GitHub environment called "release" (Settings > Environments)
#      with optional protection rules (reviewers, wait timer, etc.)

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write   # create/update GitHub Release
  id-token: write   # OIDC token for PyPI trusted publishing + Sigstore

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    # Skip PyPI publish if the PYPI_PUBLISHING variable is not set to "true".
    # One-time setup required on PyPI (trusted publisher) — see #101.
    # Until configured, release tags still build + sign + create GitHub Release;
    # only PyPI upload is deferred. Enable via: gh variable set PYPI_PUBLISHING --body "true"
    if: vars.PYPI_PUBLISHING == 'true'
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI via OIDC
        uses: pypa/gh-action-pypi-publish@release/v1

  sign:
    name: Sign with Sigstore
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Sign with Sigstore
        uses: sigstore/gh-action-sigstore-python@v3.3.0
        with:
          inputs: >-
            dist/*.tar.gz
            dist/*.whl

      - name: Upload signature bundles
        uses: actions/upload-artifact@v4
        with:
          name: sigstore-signatures
          path: dist/*.sigstore.json
          if-no-files-found: warn

  github-release:
    name: Create GitHub Release
    needs: [build, sign]
    # Run even if publish or sign was skipped/failed — GitHub Release shouldn't
    # depend on PyPI upload or Sigstore signing succeeding.
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          tag="${GITHUB_REF_NAME}"
          # Pre-release if tag contains rc, alpha, beta, dev
          prerelease=""
          if echo "$tag" | grep -qiE '(rc|alpha|beta|dev)'; then
            prerelease="--prerelease"
          fi

          # Collect artifacts — missing dirs/files are tolerated.
          assets=()
          for f in artifacts/dist/* artifacts/sigstore-signatures/*.sigstore.json; do
            if [ -f "$f" ]; then
              assets+=("$f")
            fi
          done

          # If a release already exists for this tag (e.g. created manually
          # for v0.9.1-v0.9.3), upload assets to it; otherwise create it.
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $tag already exists — uploading ${#assets[@]} asset(s)"
            if [ ${#assets[@]} -gt 0 ]; then
              gh release upload "$tag" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --clobber
            fi
          else
            echo "Creating release $tag with ${#assets[@]} asset(s)"
            gh release create "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$tag" \
              --generate-notes \
              $prerelease \
              "${assets[@]}"
          fi
