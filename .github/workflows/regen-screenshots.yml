name: Regenerate docs screenshots

# #632: on-demand regeneration of docs/images/*.png. Never auto-fires —
# a maintainer triggers it via "Run workflow" and reviews the resulting
# diff in a follow-up PR. The script that does the work is
# scripts/regen_docs_screenshots.py and is idempotent (no diff on a
# no-op run).

on:
  workflow_dispatch:
    inputs:
      theme:
        description: "Theme to capture in"
        required: false
        default: "dark"
        type: choice
        options: [dark, light]

permissions:
  contents: write
  pull-requests: write

jobs:
  regen:
    name: Capture + commit screenshot diff
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install llmwiki + e2e extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[e2e]'

      - name: Install chromium
        run: python -m playwright install --with-deps chromium

      - name: Regenerate screenshots
        run: python scripts/regen_docs_screenshots.py --theme="${{ inputs.theme }}"

      - name: Open PR with the diff (if any)
        uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/regen-docs-screenshots-${{ github.run_id }}
          title: "chore: regenerate docs/images/*.png (#632)"
          commit-message: "chore: regenerate docs/images/*.png via #632 workflow"
          body: |
            Auto-generated by `.github/workflows/regen-screenshots.yml` triggered manually with theme=${{ inputs.theme }}.

            Review the diff before merging — if a screenshot looks unintentional, close this PR and re-run after fixing the underlying UI regression.
          add-paths: docs/images/*.png
          delete-branch: true
