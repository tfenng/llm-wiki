# Reusable GitHub Action workflow for llmwiki.
#
# Other repositories can call this with:
#
#   jobs:
#     wiki:
#       uses: Pratiyush/llm-wiki/.github/workflows/llmwiki-action.yml@master
#       with:
#         python-version: "3.12"
#         sync-args: "--adapter claude-code"
#         build-args: "--out site"

name: llmwiki reusable workflow

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version to use"
        required: false
        type: string
        default: "3.12"
      sync-args:
        description: "Extra arguments passed to `llmwiki sync`"
        required: false
        type: string
        default: ""
      build-args:
        description: "Extra arguments passed to `llmwiki build`"
        required: false
        type: string
        default: ""
    outputs:
      site-dir:
        description: "Path to the generated site directory"
        value: ${{ jobs.build.outputs.site-dir }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      site-dir: ${{ steps.paths.outputs.site-dir }}

    steps:
      - name: Checkout calling repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ inputs.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install llmwiki
        run: pip install llmwiki

      - name: Initialise directory structure
        run: llmwiki init

      - name: Sync sessions
        run: llmwiki sync ${{ inputs.sync-args }}

      - name: Build static site
        run: llmwiki build ${{ inputs.build-args }}

      - name: Expose output paths
        id: paths
        run: echo "site-dir=$(pwd)/site" >> "$GITHUB_OUTPUT"

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: llmwiki-site
          path: site/
